<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Synapse</title>
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="components/messages/action-buttons/simple-action-buttons.css">
    <link rel="stylesheet" href="components/messages/process-group/process-group.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/speech.css">
    <link rel="stylesheet" href="css/scheduler-datepicker.css">
    <link rel="stylesheet" href="css/scheduler.css">
    <link rel="stylesheet" href="css/notification.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/custom/synapse-projects.css">

    <link rel="stylesheet" href="vendor/flatpickr/flatpickr.min.css">
    <script src="vendor/flatpickr/flatpickr.min.js"></script>

    <script>
        globalThis.safeCall = function (name, ...args) {
            if (window[name]) window[name](...args)
        }
    </script>

    <script type="module" src="index.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script type="module" src="js/initFw.js"></script>

    <script src="vendor/ace-min/ace.js"></script>
    <link href="vendor/ace-min/ace.min.css" rel="stylesheet">

    <link rel="stylesheet" href="vendor/katex/katex.min.css" crossorigin="anonymous">
    <script defer src="vendor/katex/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="vendor/katex/katex.auto-render.min.js" crossorigin="anonymous"></script>

    <script src="vendor/qrcode.min.js"></script>
    <link rel="stylesheet" href="vendor/google/google-icons.css" />
    <link rel="manifest" href="js/manifest.json">

    <script>
        globalThis.gitinfo = { version: "{{version_no}}", commit_time: "{{version_time}}" };

        globalThis.runtimeInfo = {
            ...(globalThis.runtimeInfo || {}),
            id: "{{runtime_id}}",
            isDevelopment: "{{runtime_is_development}}" === "true",
            loggedIn: "{{logged_in}}" === "true",
        };
    </script>

    <x-extension id="page-head"></x-extension>
    <script src="/js/translation-guard.js"></script>

    <style>
        .notranslate,
        [translate="no"] {
            unicode-bidi: isolate;
        }

        .material-symbols-outlined.notranslate,
        .material-symbols-outlined[translate="no"] {
            font-family: 'Material Symbols Outlined' !important;
            white-space: nowrap !important;
        }

        input.notranslate,
        textarea.notranslate,
        select.notranslate,
        option.notranslate {
            white-space: nowrap !important;
        }

        .field-label,
        .field-title,
        .section-title,
        .section-description,
        .button,
        .dropdown-item,
        .modal-header,
        .modal-bd,
        .onboarding-welcome-text {
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        :root {
            --syn-app-bg-1: #09101a;
            --syn-app-bg-2: #0d1521;
            --syn-app-bg-3: #121c2a;
            --syn-main-panel: rgba(15, 22, 34, 0.78);
            --syn-main-panel-light: rgba(255, 255, 255, 0.76);
            --syn-main-border: rgba(148, 163, 184, 0.14);
            --syn-main-border-strong: rgba(148, 163, 184, 0.24);
            --syn-main-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(97, 122, 165, 0.14), transparent 24%),
                radial-gradient(circle at top right, rgba(96, 88, 150, 0.10), transparent 22%),
                linear-gradient(180deg, var(--syn-app-bg-1), var(--syn-app-bg-2) 45%, var(--syn-app-bg-3));
        }

        .container {
            position: relative;
            min-height: 100vh;
            display: flex;
            overflow: visible;
        }

        #right-panel {
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: visible;
            overflow-y: visible;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.008)),
                transparent;
        }

        #right-panel::before {
            content: "";
            position: absolute;
            inset: 10px 12px 12px 0;
            border-radius: 28px;
            border: 1px solid var(--syn-main-border);
            background: var(--syn-main-panel);
            box-shadow:
                var(--syn-main-shadow),
                inset 0 1px 0 rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            pointer-events: none;
            z-index: 0;
        }

        #right-panel > * {
            position: relative;
            z-index: 1;
        }

        #chat-area-wrapper {
            flex: 1 1 auto;
            min-height: 0;
            position: relative;
            z-index: 1;
            padding: 0 18px 0 10px;
        }

        #chat-history {
            height: 100%;
            position: relative;
            z-index: 1;
        }

        #chat-nav-buttons {
            position: absolute;
            right: 24px;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            border-radius: 18px;
            background: rgba(15, 22, 34, 0.66);
            border: 1px solid var(--syn-main-border);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        #chat-nav-buttons .btn-icon-action {
            border-radius: 12px;
        }

        #toast {
            z-index: 1300;
        }

        .light-mode body {
            background:
                radial-gradient(circle at top left, rgba(120, 142, 180, 0.11), transparent 24%),
                radial-gradient(circle at top right, rgba(145, 134, 193, 0.08), transparent 22%),
                linear-gradient(180deg, #eef3f8, #e9eff6 45%, #e6edf5);
        }

        .light-mode #right-panel::before {
            background: var(--syn-main-panel-light);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow:
                0 18px 42px rgba(15, 23, 42, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.75);
        }

        .light-mode #chat-nav-buttons {
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        @media (max-width: 768px) {
            .container {
                min-height: 100vh;
            }

            #right-panel::before {
                inset: 8px 8px 8px 0;
                border-radius: 22px;
            }

            #chat-area-wrapper {
                padding: 0 10px 0 6px;
            }

            #chat-nav-buttons {
                right: 14px;
                bottom: 16px;
                gap: 8px;
                padding: 8px;
                border-radius: 16px;
            }
        }
    </style>
</head>

<body class="dark-mode device-pointer" x-data>
    <div class="container">
        <div id="sidebar-overlay" x-data>
            <template x-if="$store.sidebar">
                <div class="sidebar-overlay" :class="{'visible': $store.sidebar.isOpen && $store.sidebar.isMobile()}" @click="$store.sidebar.close()"></div>
            </template>
        </div>

        <x-component path="sidebar/left-sidebar.html"></x-component>

        <div id="right-panel" class="panel">
            <x-component path="chat/top-section/chat-top.html"></x-component>

            <div x-data x-show="$store.welcomeStore && $store.welcomeStore.isVisible">
                <x-component path="welcome/welcome-screen.html"></x-component>
            </div>

            <div id="chat-area-wrapper" x-data x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible">
                <div id="chat-history"></div>

                <div id="chat-nav-buttons" aria-label="Навигация по чату" x-cloak>
                    <button class="btn-icon-action" title="Прокрутить наверх" @click="$store.chatNavigation.scrollToTop()">
                        <span class="material-symbols-outlined notranslate" translate="no">vertical_align_top</span>
                    </button>
                    <button class="btn-icon-action" title="Предыдущее сообщение" @click="$store.chatNavigation.scrollToPrevUserMessage()">
                        <span class="material-symbols-outlined notranslate" translate="no">keyboard_arrow_up</span>
                    </button>
                    <button class="btn-icon-action" title="Следующее сообщение" @click="$store.chatNavigation.scrollToNextUserMessage()">
                        <span class="material-symbols-outlined notranslate" translate="no">keyboard_arrow_down</span>
                    </button>
                    <button class="btn-icon-action" title="Прокрутить вниз" @click="$store.chatNavigation.scrollToBottom()">
                        <span class="material-symbols-outlined notranslate" translate="no">vertical_align_bottom</span>
                    </button>
                </div>
            </div>

            <div style="position: relative; height: 0;">
                <x-component path="notifications/notification-toast-stack.html"></x-component>
            </div>

            <div id="toast" class="toast">
                <div class="toast__content">
                    <div class="toast__title"></div>
                    <div class="toast__separator"></div>
                    <div class="toast__message"></div>
                </div>
                <button class="toast__copy" style="display: none;">Копировать</button>
                <button class="toast__close">Закрыть</button>
            </div>

            <div x-show="!$store.welcomeStore || !$store.welcomeStore.isVisible">
                <x-component path="chat/input/progress.html"></x-component>
                <x-component path="chat/input/chat-bar.html"></x-component>
            </div>
        </div>
    </div>

    <x-component path="chat/attachments/dragDropOverlay.html"></x-component>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('js/sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
</body>

</html>
