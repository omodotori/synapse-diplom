<html>

<head>
    <title>Структура файлов проекта</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <!-- <div class="project-detail-header">
                        <div class="projects-project-card-title">Project details</div>
                        <div class="project-path" x-text="$store.projects.selectedProject.path"></div>
                    </div> -->


                <div class="projects-setting-row" style="padding: 1rem 0;">
                    <div class="projects-setting-text">
                        <label class="projects-form-label">Добавить структуру проекта в контекстное окно</label>
                        <span class="projects-form-description">Если включено, файловая структура проекта будет
                            добавлена в контекстное окно ассистента Synapse. Это полезно для агентов, которым необходимо
                            постоянно иметь представление о папках и файлах проекта.</span>
                    </div>
                    <div class="projects-setting-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="$store.projects.selectedProject.file_structure.enabled">
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div x-show="$store.projects.selectedProject.file_structure.enabled">


                    <div class="projects-form-group">
                        <label class="projects-form-label">Максимальная глубина</label>
                        <span class="projects-form-description">Установите максимальную глубину для структуры файлов (0 =
                            без ограничений).</span>
                        <input type="number" class="projects-form-input"
                            x-model.number="$store.projects.selectedProject.file_structure.max_depth" min="0" step="1"
                            placeholder="0">
                    </div>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Максимальное количество строк</label>
                        <span class="projects-form-description">Максимальное общее количество строк, выводимое для Synapse. Это ограничивает
                            место, занимаемое в контекстном окне (0 = без ограничений).</span>
                        <input type="number" class="projects-form-input"
                            x-model.number="$store.projects.selectedProject.file_structure.max_lines" min="0" step="1"
                            placeholder="0">
                    </div>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Максимальное количество папок</label>
                        <span class="projects-form-description">Максимальное количество подпапок для отображения внутри одной папки
                            (0 = без ограничений).</span>
                        <input type="number" class="projects-form-input"
                            x-model.number="$store.projects.selectedProject.file_structure.max_folders" min="0" step="1"
                            placeholder="0">
                    </div>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Максимальное количество файлов</label>
                        <span class="projects-form-description">Максимальное количество файлов для отображения внутри одной папки (0 =
                            без ограничений).</span>
                        <input type="number" class="projects-form-input"
                            x-model.number="$store.projects.selectedProject.file_structure.max_files" min="0" step="1"
                            placeholder="0">
                    </div>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Игнорируемые файлы / папки</label>
                        <span class="projects-form-description">Укажите шаблоны в формате gitignore. Эти файлы и
                            папки будут пропущены при анализе, например, служебные папки, директории кэша, пакеты
                            и артефакты сборки.</span>
                        <textarea class="projects-form-textarea"
                            x-model="$store.projects.selectedProject.file_structure.gitignore" rows="5"
                            placeholder="Введите шаблоны gitignore (напр. node_modules/, .git/, *.log)"></textarea>
                    </div>

                    <button class="button icon-button" x-on:click="$store.projects.testFileStructure()">
                        <span class="icon material-symbols-outlined">account_tree</span>
                        <span>Протестировать вывод</span>
                    </button>


                </div>

            </div>
        </template>
    </div>
</body>


</html>
