<html>

<head>
    <title>Создать новый проект</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <div class="project-detail">

                    <x-component path="projects/project-edit-basic-data.html">
                    </x-component>

                    <div class="projects-form-group">
                        <label class="projects-form-label">Git-репозиторий (необязательно)</label>
                        <span class="projects-form-description">Клонировать из существующего git-репозитория. Оставьте пустым, чтобы создать пустой проект.</span>
                        <input class="projects-form-input" type="text" 
                            x-model="$store.projects.selectedProject.git_url"
                            :disabled="$store.projects.selectedProject._cloning"
                            placeholder="https://github.com/user/repo.git">
                    </div>

                    <template x-if="$store.projects.selectedProject.git_url && $store.projects.selectedProject.git_url.trim()">
                        <div class="projects-form-group">
                            <label class="projects-form-label">Токен доступа (необязательно)</label>
                            <span class="projects-form-description">Для приватных репозиториев. Токен используется только для клонирования и не будет сохранен.</span>
                            <input class="projects-form-input" type="password" 
                                x-model="$store.projects.selectedProject.git_token"
                                :disabled="$store.projects.selectedProject._cloning"
                                placeholder="ghp_xxxx or glpat-xxxx">
                        </div>
                    </template>

                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                            @click="$store.projects.cancelCreate()"
                            :disabled="$store.projects.selectedProject._cloning">Отмена</button>
                        <button type="button" class="button confirm" 
                            @click="$store.projects.confirmCreate()"
                            :disabled="$store.projects.selectedProject._cloning">
                            <template x-if="$store.projects.selectedProject._cloning">
                                <span class="button-loading">
                                    <span class="spinner"></span>
                                    <span>Клонирование...</span>
                                </span>
                            </template>
                            <template x-if="!$store.projects.selectedProject._cloning">
                                <span x-text="$store.projects.selectedProject.git_url ? 'Клонировать и продолжить' : 'Создать и продолжить'"></span>
                            </template>
                        </button>
                    </div>
                </div>


            </div>
        </template>
    </div>
</body>


</html>
