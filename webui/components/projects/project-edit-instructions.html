<html>

<head>
    <title>Инструкции проекта</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <!-- <div class="project-detail-header">
                        <div class="projects-project-card-title">Project details</div>
                        <div class="project-path" x-text="$store.projects.selectedProject.path"></div>
                    </div> -->

                <div class="projects-form-group">
                    <label class="projects-form-label">Описание</label>
                    <span class="projects-form-description">Опишите проект. Это поможет как вам, так и Synapse понять контекст проекта.</span>
                    <textarea class="projects-form-textarea" x-model="$store.projects.selectedProject.description"
                        rows="5" placeholder="Введите описание проекта"></textarea>
                </div>

                <div class="projects-form-group">
                    <label class="projects-form-label">Инструкции</label>
                    <span class="projects-form-description">Предоставьте конкретные инструкции для Synapse, относящиеся к этому проекту.</span>
                    <textarea class="projects-form-textarea"
                        x-model="$store.projects.selectedProject.instructions" rows="15"
                        placeholder="Введите инструкции проекта"></textarea>
                </div>

                <div class="projects-form-group">
                    <label class="projects-form-label">Файлы инструкций</label>
                    <div class="projects-input-with-button-wrapper">
                        <span class="projects-form-description">Дополнительные файлы инструкций в <strong><span
                                    x-text="$store.projects.getSelectedAbsPath('.a0proj','instructions')"></span></strong>. В настоящее время поддерживаются только текстовые файлы (txt, md, yaml; без PDF и изображений).</span>
                        <span class="projects-form-description">В настоящее время добавлено файлов инструкций: <strong><span
                                    x-text="$store.projects.selectedProject.instruction_files_count || 0"></span></strong>.</span>
                        <button class="button icon-button" x-on:click="$store.projects.browseInstructionFiles()">
                            <span class="icon material-symbols-outlined">folder</span>
                            <span>Обзор</span>
                        </button>
                    </div>
                </div>
            </div>


        </template>
    </div>
</body>


</html>
