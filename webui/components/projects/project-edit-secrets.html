<html>

<head>
    <title>Секреты проекта</title>
    <script type="module">
        import { store } from "/components/projects/projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <!-- <div class="project-detail-header">
                        <div class="projects-project-card-title">Project details</div>
                        <div class="project-path" x-text="$store.projects.selectedProject.path"></div>
                     </div> -->

                <div class="projects-form-group">
                    <label class="projects-form-label">Обычные переменные</label>
                    <span class="projects-form-description">Храните нечувствительные переменные в формате .env (например,
                        EMAIL_IMAP_SERVER="imap.gmail.com", по одной на строку). Вы можете использовать комментарии, начинающиеся с #, чтобы
                        добавить описания для Synapse. См. <a
                            href="javascript:openModal('settings/secrets/example-vars.html')">пример</a>.
                        <br>
                        Эти переменные видимы для LLM и в истории чата, они не маскируются.</span>
                    <textarea class="projects-form-textarea" x-model="$store.projects.selectedProject.variables"
                        rows="10" placeholder="Введите переменные проекта"></textarea>
                </div>

                <div class="projects-form-group">
                    <label class="projects-form-label">Чувствительные переменные (секреты)</label>
                    <span class="projects-form-description">
                        Храните секреты и учетные данные в формате .env (например, EMAIL_PASSWORD="s3cret-p4$$w0rd", по одной
                        на строку). Вы можете использовать комментарии, начинающиеся с #, чтобы добавить описания для Synapse. См. <a
                            href="javascript:openModal('settings/secrets/example-secrets.html')">пример</a>.<br>Эти
                        переменные скрыты от LLM и маскируются в истории чата. ⚠️ Маскируются только значения длиной
                        &gt;= 4 символов во избежание ложных срабатываний.
                    </span>
                    <textarea class="projects-form-textarea"
                        x-model="$store.projects.selectedProject.secrets" rows="10"
                        placeholder="Введите секреты проекта"></textarea>
                </div>
            </div>


        </template>
    </div>
</body>


</html>
