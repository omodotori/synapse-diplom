<html>
<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.sidebar">
      <div class="sidebar-shell">
        
        <button
          class="sidebar-restore-button"
          x-show="!$store.sidebar.isOpen"
          @click="$store.sidebar.toggle()"
          aria-label="Открыть боковую панель"
          title="Открыть боковую панель"
        >
          <span class="material-symbols-outlined notranslate" translate="no">menu</span>
        </button>

        <div id="left-panel" class="panel synapse-sidebar" x-data :class="{'hidden': !$store.sidebar.isOpen}">
          <x-extension id="sidebar-start"></x-extension>

          <div class="sidebar-inner">
            <!-- Header now lives INSIDE sidebar flow -->
            <div class="sidebar-header-slot">
              <x-component path="sidebar/top-section/header-icons.html"></x-component>
            </div>

            <div class="left-panel-top no-scrollbar">
<div class="sidebar-section config-section" id="chats-section">
                <div class="sidebar-section-shell">
                  <x-component path="sidebar/chats/chats-list.html"></x-component>
                </div>
              </div>

              <div class="sidebar-section config-section" id="tasks-section">
                <div class="sidebar-section-shell">
                  <x-component path="sidebar/tasks/tasks-list.html"></x-component>
                </div>
              </div>
            </div>

            <div class="left-panel-bottom">
              <div class="sidebar-bottom-wrap">
                <x-component path="sidebar/bottom/sidebar-bottom.html"></x-component>
              </div>
            </div>
          </div>

          <x-extension id="sidebar-end"></x-extension>
        </div>
      </div>
    </template>
  </div>

  <style>
    :root {
      --synapse-sidebar-width: 286px;
      --synapse-sidebar-radius: 22px;
      --synapse-soft-border: rgba(255, 255, 255, 0.08);
      --synapse-soft-border-2: rgba(255, 255, 255, 0.05);
      --synapse-soft-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      --synapse-inner-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .sidebar-shell {
      position: relative;
      height: 100vh;
      display: flex;
    }

    #left-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.012) 100%),
        linear-gradient(180deg, rgba(13, 19, 30, 0.96), rgba(15, 21, 33, 0.94));
      border-right: 1px solid var(--color-border);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      width: var(--synapse-sidebar-width);
      min-width: var(--synapse-sidebar-width);
      color: var(--color-text);
      user-select: none;
      -webkit-user-select: none;
      height: 100vh;
      overflow: hidden;
      position: relative;
      box-shadow: var(--synapse-soft-shadow);
    }

    #left-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(103, 124, 167, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(107, 87, 156, 0.12), transparent 34%);
    }

    #left-panel::after {
      content: "";
      position: absolute;
      inset: 12px 10px 12px 10px;
      border-radius: var(--synapse-sidebar-radius);
      border: 1px solid var(--synapse-soft-border);
      box-shadow: var(--synapse-inner-shadow);
      pointer-events: none;
    }

    .sidebar-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    #left-panel.hidden {
      margin-left: calc(var(--synapse-sidebar-width) * -1);
    }

    .sidebar-header-slot {
      flex: 0 0 auto;
      padding: 0.9rem 0.9rem 0 0.9rem;
    }

    .left-panel-top {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      justify-content: flex-start;
      margin-top: 0;
      padding: 0.9rem 0.9rem 0 0.9rem;
      gap: 0.95rem;
    }

    .sidebar-top-wrap,
    .sidebar-bottom-wrap,
    .sidebar-section-shell {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--synapse-soft-border-2);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .sidebar-top-wrap {
      padding: 0.35rem;
      overflow: hidden;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    #chats-section {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow: hidden;
    }

    #tasks-section {
      flex: 0 0 auto;
      max-height: 42%;
      padding-top: 0;
      margin-top: 0;
    }

    .sidebar-section-shell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      padding: 0.45rem;
      overflow: hidden;
    }

    #chats-section .sidebar-section-shell {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    .left-panel-bottom {
      position: relative;
      flex-shrink: 0;
      flex-grow: 0;
      padding: 0.9rem;
      padding-top: 0.75rem;
    }

    .sidebar-bottom-wrap {
      padding: 0.4rem;
      overflow: hidden;
    }

    #chats-section > x-component,
    #chats-section > x-component > div[x-data],
    #tasks-section > x-component,
    #tasks-section > x-component > div[x-data],
    #tasks-section > x-component > div[x-data] > div[x-data] {
      display: contents;
    }

    #tasks-section .collapse {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #tasks-section .collapsing {
      flex: 0 0 auto !important;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin: 0 0 0.6rem 0;
      padding: 0.18rem 0.3rem;
      user-select: none;
      -webkit-user-select: none;
      font-size: var(--font-size-normal);
      border-radius: 12px;
    }

    .section-header-collapsible {
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .section-header-collapsible:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .light-mode #left-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.88) 0%, rgba(245,248,252,0.80) 100%),
        var(--color-panel);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .light-mode #left-panel::before {
      background:
        radial-gradient(circle at top left, rgba(79, 140, 255, 0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.08), transparent 30%);
    }

    .light-mode #left-panel::after {
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .light-mode .sidebar-top-wrap,
    .light-mode .sidebar-bottom-wrap,
    .light-mode .sidebar-section-shell {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.06);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    @media (max-width: 768px) {
      #left-panel {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: var(--synapse-sidebar-width) !important;
        min-width: var(--synapse-sidebar-width);
        z-index: 1003;
      }

      #left-panel.hidden {
        margin-left: calc(var(--synapse-sidebar-width) * -1);
      }

      .sidebar-header-slot,
      .left-panel-top,
      .left-panel-bottom {
        padding-left: 0.8rem;
        padding-right: 0.8rem;
      }
    }

    @media (max-height: 700px) {
      .left-panel-top {
        overflow-y: auto;
        scroll-behavior: smooth;
        -webkit-scroll-behavior: smooth;
      }

      #tasks-section {
        max-height: 48%;
      }
    }
  
    /* CHAT LIST SCROLL FIX - shell scrolls */
    #chats-section {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      overflow: hidden !important;
    }

    #chats-section .sidebar-section-shell {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      height: auto !important;
      max-height: calc(100vh - 230px) !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      -webkit-overflow-scrolling: touch !important;
      padding-bottom: 0.7rem !important;
    }

    #chats-section .sidebar-section-shell::-webkit-scrollbar {
      display: block !important;
      width: 6px !important;
    }

    #chats-section .chats-list-container {
      height: auto !important;
      min-height: auto !important;
      overflow: visible !important;
    }

    #chats-section .chats-config-list {
      height: auto !important;
      max-height: none !important;
      overflow: visible !important;
      padding-bottom: 40px !important;
    }

  </style>
</body>
</html>
