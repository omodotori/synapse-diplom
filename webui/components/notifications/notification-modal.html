<html>

<head>
    <title>Уведомления</title>
    <script type="module">
        import { store } from "/components/notifications/notification-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.notificationStore">
            <div>
                <!-- Modal Header Actions -->
                <div class="modal-subheader">
                    <div class="notification-header-actions">
                        <button class="notification-action" @click="$store.notificationStore?.clearAll()"
                            :disabled="!$store.notificationStore || $store.notificationStore.getDisplayNotifications().length === 0"
                            title="Очистить всё">
                            <span class="material-symbols-outlined">delete</span> Очистить всё
                        </button>
                    </div>
                </div>

                <!-- Notifications List -->
                <div class="notification-list"
                    x-show="$store.notificationStore && $store.notificationStore.getDisplayNotifications().length > 0">
                    <template x-for="notification in ($store.notificationStore?.getDisplayNotifications() || [])"
                        :key="notification.id">
                        <div class="notification-item" x-data="{ expanded: false }"
                            :class="$store.notificationStore?.getNotificationItemClass(notification) || 'notification-item'"
                            @click="$store.notificationStore?.markAsRead(notification.id)">

                            <div class="notification-icon"
                                x-html="$store.notificationStore?.getNotificationIcon(notification.type) || ''">
                            </div>

                            <div class="notification-content">
                                <div class="notification-title" x-show="notification.title" x-text="notification.title">
                                </div>
                                <div class="notification-message" x-html="notification.message">
                                </div>
                                <div class="notification-timestamp"
                                    x-text="$store.notificationStore?.formatTimestamp(notification.timestamp) || notification.timestamp">
                                </div>

                                <!-- Expand Toggle Button (as last row element) -->
                                <button class="notification-expand-toggle" x-show="notification.detail"
                                    @click.stop="expanded = !expanded"
                                    :title="expanded ? 'Скрыть детали' : 'Показать детали'">
                                    <span x-show="!expanded">▶ Показать детали</span>
                                    <span x-show="expanded">▼ Скрыть детали</span>
                                </button>

                                <!-- Expandable Detail Content -->
                                <div class="notification-detail" x-show="expanded && notification.detail"
                                    x-transition:enter="transition ease-out duration-200"
                                    x-transition:enter-start="opacity-0 max-h-0"
                                    x-transition:enter-end="opacity-100 max-h-96"
                                    x-transition:leave="transition ease-in duration-200"
                                    x-transition:leave-start="opacity-100 max-h-96"
                                    x-transition:leave-end="opacity-0 max-h-0">
                                    <div class="notification-detail-content" x-html="notification.detail"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Empty State -->
                <div class="notification-empty"
                    x-show="!$store.notificationStore || $store.notificationStore.getDisplayNotifications().length === 0">
                    <div class="notification-empty-icon">
                        <span class="material-symbols-outlined">notifications</span>
                    </div>
                    <p>Нет уведомлений</p>
                </div>
            </div>
        </template>
    </div>

    





<style>
/* ===== Synapse notification modal overrides ===== */
.modal-container.notification-modal {
  width: min(92vw, 720px) !important;
  max-width: 720px !important;
  max-height: 84vh !important;
}

.modal-header {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
    rgba(18, 26, 40, 0.66) !important;
  border-bottom: 1px solid rgba(148, 163, 184, 0.12) !important;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.modal-title {
  color: #eef3fa !important;
  letter-spacing: -0.02em;
}

.modal-bd,
.modal-scroll {
  background:
    radial-gradient(circle at top left, rgba(90, 116, 160, 0.10), transparent 26%),
    linear-gradient(180deg, rgba(11,17,27,0.96), rgba(16,24,38,0.96)) !important;
}

.modal-subheader {
  margin-bottom: 10px;
}

.notification-header-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  width: 100%;
}

.notification-action {
  min-height: 40px;
  padding: 0 14px;
  border-radius: 14px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
    rgba(18, 26, 40, 0.56) !important;
  border: 1px solid rgba(148, 163, 184, 0.14) !important;
  color: #e7edf7 !important;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  box-shadow:
    0 10px 24px rgba(0,0,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.notification-action:hover {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
    rgba(18, 26, 40, 0.72) !important;
  border-color: rgba(148, 163, 184, 0.22) !important;
}

.notification-action:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.notification-list {
  max-height: 60vh;
  overflow-y: scroll !important;
  padding: 0.25rem 0;
}

.notification-item {
  display: flex;
  align-items: flex-start;
  gap: 0.9rem;
  padding: 1rem;
  margin-bottom: 0.7rem;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
    rgba(18, 26, 40, 0.58) !important;
  border: 1px solid rgba(148, 163, 184, 0.12) !important;
  box-shadow:
    0 12px 28px rgba(0,0,0,0.14),
    inset 0 1px 0 rgba(255,255,255,0.02);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
}

.notification-item:hover {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
    rgba(18, 26, 40, 0.72) !important;
  border-color: rgba(148, 163, 184, 0.20) !important;
}

.notification-item.unread {
  border-left: 3px solid #7b8fb2 !important;
}

.notification-item.read {
  opacity: 0.84;
}

.notification-icon {
  width: 38px;
  height: 38px;
  min-width: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(148,163,184,0.10);
  margin-top: 0.05rem;
}

.notification-title {
  font-weight: 650;
  font-size: 0.92rem;
  color: #eef3fa !important;
  margin-bottom: 0.25rem;
  line-height: 1.35;
}

.notification-message {
  font-size: 0.84rem;
  color: #c4d0e0 !important;
  line-height: 1.5;
  margin-bottom: 0.45rem;
}

.notification-timestamp {
  font-size: 0.74rem;
  color: #94a3b8 !important;
  opacity: 0.9;
  margin-top: 0.35rem;
}

.notification-expand-toggle {
  margin-top: 0.45rem;
  padding: 0.4rem 0.6rem;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  color: #dce6f4 !important;
  border: none;
}

.notification-expand-toggle:hover {
  background: rgba(255,255,255,0.08) !important;
}

.notification-detail {
  margin-top: 0.7rem;
  padding: 0.8rem 0.9rem;
  border-radius: 14px;
  background: rgba(7, 12, 20, 0.32) !important;
  border: 1px solid rgba(148, 163, 184, 0.10) !important;
  border-left: 3px solid rgba(123, 143, 178, 0.30) !important;
}

.notification-detail-content {
  color: #d5deec !important;
}

.notification-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: #95a3b8 !important;
}

.notification-empty-icon {
  font-size: 3rem;
  opacity: 0.45;
  margin-bottom: 0.7rem;
}

.light-mode .modal-header {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.66)),
    rgba(255,255,255,0.78) !important;
  border-bottom: 1px solid rgba(100, 116, 139, 0.10) !important;
}

.light-mode .modal-title {
  color: #1d2735 !important;
}

.light-mode .modal-bd,
.light-mode .modal-scroll {
  background:
    radial-gradient(circle at top left, rgba(132, 149, 182, 0.10), transparent 26%),
    linear-gradient(180deg, rgba(238,243,249,0.96), rgba(232,238,246,0.96)) !important;
}

.light-mode .notification-action,
.light-mode .notification-item {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.66)),
    rgba(255,255,255,0.72) !important;
  border-color: rgba(100, 116, 139, 0.12) !important;
  box-shadow:
    0 10px 24px rgba(15,23,42,0.06),
    inset 0 1px 0 rgba(255,255,255,0.72);
}

.light-mode .notification-title {
  color: #1d2735 !important;
}

.light-mode .notification-message {
  color: #4d5e74 !important;
}

.light-mode .notification-timestamp,
.light-mode .notification-empty {
  color: #66768b !important;
}

.light-mode .notification-detail {
  background: rgba(255,255,255,0.56) !important;
  border-color: rgba(100, 116, 139, 0.10) !important;
}
</style>

</body>

</html>
