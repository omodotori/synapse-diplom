<html>
<head>
    <title>–Т–Њ—Б—Б—В–∞–љ–Њ–≤–Є—В—М –±—Н–Ї–∞–њ</title>
    <script type="module">
        import { store } from "/components/settings/backup/backup-store.js";
    </script>
</head>
<body>
    <div x-data>
        <template x-if="$store.backupStore">
            <div x-init="$store.backupStore.initRestore()" x-destroy="$store.backupSt                 <!-- File Upload Section -->
                <div class="upload-section">
                    <label for="backup-file" class="upload-label">
                        –Т—Л–±–µ—А–Є—В–µ —Д–∞–є–ї —А–µ–Ј–µ—А–≤–љ–Њ–є –Ї–Њ–њ–Є–Є (.zip)
                    </label>
                    <input type="file" id="backup-file" accept=".zip"
                           @change="$store.backupStore.handleFileUpload($event)">
                </div>

                <!-- Warning Message (only show when backup file is loaded) -->
                <div x-show="$store.backupStore.backupMetadata" class="restore-warning">
                    <span class="warning-icon">вЪ†пЄП</span>
                    <span class="warning-text">–Я–Њ—Б–ї–µ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є—П –±—Н–Ї–∞–њ–∞ –≤–∞–Љ –љ—Г–ґ–љ–Њ –±—Г–і–µ—В –њ–µ—А–µ–Ј–∞–њ—Г—Б—В–Є—В—М Agent-Zero, —З—В–Њ–±—Л –њ–Њ–ї–љ–Њ—Б—В—М—О –Ј–∞–≥—А—Г–Ј–Є—В—М –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–љ—Г—О –Ї–Њ–љ—Д–Є–≥—Г—А–∞—Ж–Є—О (–Ї–љ–Њ–њ–Ї–∞ –љ–∞ –ї–µ–≤–Њ–є –њ–∞–љ–µ–ї–Є).</span>
                    <span class="warning-icon">вЪ†пЄП</span>
                </div>

                <!-- File Conflict Policy (Dropdown) -->
                <div x-show="$store.backupStore.backupMetadata" class="overwrite-policy">
                    <label class="policy-label">
                        <span class="policy-label-text">–Ъ–Њ–љ—Д–ї–Є–Ї—В—Л —Д–∞–є–ї–Њ–≤:</span>
                        <select x-model="$store.backupStore.overwritePolicy" class="policy-dropdown">
                            <option value="overwrite">–Я–µ—А–µ–Ј–∞–њ–Є—Б—Л–≤–∞—В—М —Б—Г—Й–µ—Б—В–≤—Г—О—Й–Є–µ —Д–∞–є–ї—Л</option>
                            <option value="skip">–Я—А–Њ–њ—Г—Б–Ї–∞—В—М —Б—Г—Й–µ—Б—В–≤—Г—О—Й–Є–µ —Д–∞–є–ї—Л</option>
                            <option value="backup">–°–Њ–Ј–і–∞–≤–∞—В—М —А–µ–Ј–µ—А–≤–љ—Л–µ –Ї–Њ–њ–Є–Є (.backup.timestamp)</option>
                        </select>
                    </label>
                </div>

                <!-- Clean Before Restore Option -->
                <div x-show="$store.backupStore.backupMetadata" class="clean-before-restore">
                    <label class="checkbox-label">
                        <input type="checkbox" x-model="$store.backupStore.cleanBeforeRestore">
                        <span class="checkbox-text">–Ю—З–Є—Б—В–Є—В—М –њ–µ—А–µ–і –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є–µ–Љ (—Г–і–∞–ї–Є—В—М —Б—Г—Й–µ—Б—В–≤—Г—О—Й–Є–µ —Д–∞–є–ї—Л –њ–Њ –Љ–∞—Б–Ї–∞–Љ –±—Н–Ї–∞–њ–∞)</span>
                    </label>
                    <div class="clean-description">
                        –Я—А–Є –≤–Ї–ї—О—З–µ–љ–Є–Є —Н—В–Њ–≥–Њ –њ–∞—А–∞–Љ–µ—В—А–∞ –≤—Б–µ —Б—Г—Й–µ—Б—В–≤—Г—О—Й–Є–µ —Д–∞–є–ї—Л, —Б–Њ–Њ—В–≤–µ—В—Б—В–≤—Г—О—Й–Є–µ –Є—Б—Е–Њ–і–љ—Л–Љ –Љ–∞—Б–Ї–∞–Љ —А–µ–Ј–µ—А–≤–љ–Њ–≥–Њ –Ї–Њ–њ–Є—А–Њ–≤–∞–љ–Є—П, –±—Г–і—Г—В —Г–і–∞–ї–µ–љ—Л –њ–µ—А–µ–і –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є–µ–Љ —Д–∞–є–ї–Њ–≤ –Є–Ј –∞—А—Е–Є–≤–∞. –≠—В–Њ –≥–∞—А–∞–љ—В–Є—А—Г–µ—В –∞–±—Б–Њ–ї—О—В–љ–Њ —З–Є—Б—В–Њ–µ —Б–Њ—Б—В–Њ—П–љ–Є–µ –њ–Њ—Б–ї–µ –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є—П.
                    </div>
                </div>

                <!-- Loading indicator -->
                <div x-show="$store.backupStore.loading" class="restore-loading">
                    <span x-text="$store.backupStore.loadingMessage || '–Ю–±—А–∞–±–Њ—В–Ї–∞...'"></span>
                </div>

                <!-- Error display -->
                <div x-show="$store.backupStore.error" class="restore-error">
                    <span x-text="$store.backupStore.error"></span>
                </div>

                <!-- Success display -->
                <div x-show="$store.backupStore.restoreResult" class="restore-result">
                    <h4>–Т–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є–µ –Ј–∞–≤–µ—А—И–µ–љ–Њ</h4>
                    <div class="result-stats">
                        <div x-show="$store.backupStore.restoreResult?.deleted_files?.length > 0">–£–і–∞–ї–µ–љ–Њ: <span x-text="$store.backupStore.restoreResult?.deleted_files?.length || 0"></span></div>
                        <div>–Т–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Њ: <span x-text="$store.backupStore.restoreResult?.restored_files?.length || 0"></span></div>
                        <div>–Я—А–Њ–њ—Г—Й–µ–љ–Њ: <span x-text="$store.backupStore.restoreResult?.skipped_files?.length || 0"></span></div>
                        <div>–Ю—И–Є–±–Ї–Є: <span x-text="$store.backupStore.restoreResult?.errors?.length || 0"></span></div>
                    </div>
                </div>

                <!-- Header with buttons (following MCP servers pattern) -->
                <h3 x-show="$store.backupStore.backupMetadata">JSON –Ї–Њ–љ—Д–Є–≥—Г—А–∞—Ж–Є–Є –≤–Њ—Б—Б—В–∞–љ–Њ–≤–ї–µ–љ–Є—П
                    <button class="btn slim" style="margin-left: 0.5em;"
                        @click="$store.backupStore.formatJson()">–§–Њ—А–Љ–∞—В–Є—А–Њ–≤–∞—В—М</button>
                    <button class="btn slim" style="margin-left: 0.5em;"
                        @click="$store.backupStore.resetToOriginalMetadata()">–°–±—А–Њ—Б</button>
                    <button class="btn slim" style="margin-left: 0.5em;"
                        @click="$store.backupStore.dryRun()" :disabled="$store.backupStore.loading">–Ґ–µ—Б—В–Њ–≤—Л–є –Ј–∞–њ—Г—Б–Ї</button>
                    <button class="btn slim primary" style="margin-left: 0.5em;"
                        @click="$store.backupStore.performRestore()" :disabled="$store.backupStore.loading">–Т–Њ—Б—Б—В–∞–љ–Њ–≤–Є—В—М —Д–∞–є–ї—Л</button>
                </h3>

                <!-- JSON Editor (upper part) -->
                <div x-show="$store.backupStore.backupMetadata" id="restore-metadata-editor"></div>

                <!-- File Operations Display (lower part) -->
                <h3 x-show="$store.backupStore.backupMetadata" id="restore-operations">–Ю–њ–µ—А–∞—Ж–Є–Є —Б —Д–∞–є–ї–∞–Љ–Є</h3>

                <!-- File listing textarea -->
                <div x-show="$store.backupStore.backupMetadata" class="file-operations-container">
                    <textarea id="restore-file-list"
                              x-model="$store.backupStore.fileOperationsLog"
                              readonly
                              placeholder="–Ю–њ–µ—А–∞—Ж–Є–Є —Б —Д–∞–є–ї–∞–Љ–Є –±—Г–і—Г—В –Њ—В–Њ–±—А–∞–ґ–∞—В—М—Б—П –Ј–і–µ—Б—М..."></textarea>
                </div>∞–ґ–∞—В—М—Б—П –Ј–і–µ—Б—М..."></textarea>
                </div>

            </div>
        </template>
    </div>

    <style>
        .upload-section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 2px dashed var(--color-border);
            border-radius: 4px;
            text-align: center;
        }

        .upload-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .restore-loading {
            width: 100%;
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 2rem;
            color: var(--color-secondary);
        }

        #restore-metadata-editor {
            width: 100%;
            height: 25em;
        }

        .file-operations-container {
            margin-top: 0.5em;
            margin-bottom: 1em;
        }

        #restore-file-list {
            width: 100%;
            height: 15em;
            font-family: monospace;
            font-size: 0.85em;
            background: var(--color-input);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 0.5em;
            resize: vertical;
        }

        .overwrite-policy {
            margin: 1rem 0;
        }

        .policy-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .clean-before-restore {
            margin: 1rem 0;
            padding: 0.75rem;
            background: var(--color-input);
            border: 1px solid var(--color-border);
            border-radius: 4px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
        }

        .checkbox-text {
            font-weight: 600;
            color: var(--color-text);
        }

        .clean-description {
            font-size: 0.85rem;
            color: var(--color-secondary);
            line-height: 1.4;
            margin-left: 1.5rem;
        }

        .policy-label-text {
            font-weight: 600;
            white-space: nowrap;
        }

        .policy-dropdown {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-input);
            color: var(--color-text);
            font-size: 0.9rem;
        }

        .restore-error {
            color: var(--color-error);
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: var(--color-input);
            border: 1px solid var(--color-error);
            border-radius: 4px;
        }

        .restore-result {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--color-secondary);
            border-radius: 4px;
        }

        .result-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .restore-warning {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--color-background);
            border: 2px solid #f1c40f;
            border-radius: 4px;
            color: var(--color-text);
        }

        .warning-icon {
            font-size: 1.2em;
            margin: 0 1rem;
            color: #f39c12;
        }

        .warning-text {
            text-align: center;
            font-weight: 500;
            flex: 1;
        }
    </style>
</body>
</html>
