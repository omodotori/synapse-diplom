<html>
  <head>
    <title>Обновление</title>
    <script type="module">
      import { store } from "/components/settings/external/self-update-store.js";
    </script>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
        <div class="section-title">Самообновление</div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Открыть обновление</div>
            <div class="field-description">
              Выберите целевую ветку и тег, решите, нужно ли сначала упаковать в zip <code>/a0/usr</code>, и просмотрите постоянный триггер, статус и расположение лог-файлов, используемых между перезапусками.
            </div>
            <template x-if="!$store.settings.additional?.is_dockerized">
              <div class="field-description">
                Это действие в настоящее время доступно только для установок в Docker.
              </div>
            </template>
          </div>
          <div class="field-control">
            <button
              class="btn btn-field"
              @click="$store.selfUpdateStore.openModal()"
              :disabled="!$store.settings.additional?.is_dockerized"
            >
              Открыть обновление
            </button>
          </div>
        </div>

        <div class="field">
          <div class="field-label">
            <div class="field-title">Включить проверку обновлений</div>
            <div class="field-description">
              Периодически проверять наличие новых выпусков Synapse и показывать уведомление, когда рекомендуется обновление.
            </div>
          </div>
          <div class="field-control">
            <label class="toggle">
              <input type="checkbox" x-model="settings.update_check_enabled" />
              <span class="toggler"></span>
            </label>
          </div>
        </div>
        </div>
      </template>
    </div>
  </body>
</html>
