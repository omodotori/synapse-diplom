<html>

<head>
    <title>Подключение к A0 A2A Server</title>
</head>

<body>
    <div x-data>
        <p>Synapse A2A Server включает протокол связи FastA2A с другими агентами.</p>
        <p>Другие агенты могут подключаться используя URL ниже (замените хост при необходимости):</p>

        <!-- API Token Information -->
        <div x-data>
            <template x-if="$store.settings.settings">
                <div style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: 6px; padding: 12px; margin: 16px 0;">
                    <h4 style="margin: 0 0 8px 0; color: var(--color-text-primary);">Информация об API Токене</h4>
                    <p style="margin: 0 0 8px 0; color: var(--color-text-secondary); font-size: 14px;">
                        Токен, используемый в URL, автоматически генерируется из вашего имени пользователя и пароля.
                        Этот же токен используется для внешних API. Токен меняется при обновлении учетных данных.
                    </p>
                    <div style="margin-top: 8px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--color-text-secondary); font-size: 12px; font-weight: 600;">Токен:</label>
                        <input type="text" readonly x-model="$store.settings.settings.mcp_server_token" style="width: 100%; padding: 6px 8px; background-color: var(--color-bg-primary); color: var(--color-text-primary); border: 1px solid var(--color-border); border-radius: 4px; font-family: monospace; font-size: 13px;" />
                    </div>
                </div>
            </template>
        </div>

        <h3>URL подключения A2A</h3>

        <!-- Project selector -->
        <div style="margin: 16px 0;">
            <label for="a2a-project-select" style="display: block; margin-bottom: 8px; color: var(--color-text-primary);">
                Выберите проект (необязательно):
            </label>
            <select id="a2a-project-select" style="width: 100%; padding: 8px; background-color: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border); border-radius: 4px;">
                <option value="">Нет проекта</option>
            </select>
        </div>

        <div id="a2a-connection-example"></div>

        <script>
            (async () => {
                const API = await import("/js/api.js");
                const url = window.location.origin;
                
                // Fetch token from settings API - try a2a_token first, fallback to mcp_server_token
                let token = "";
                try {
                    const response = await API.callJsonApi("settings_get", null);
                    token = response?.settings?.mcp_server_token || "";
                } catch (e) {
                    console.error("Failed to fetch token:", e);
                }

                // Fetch and populate projects
                const projectSelect = document.getElementById('a2a-project-select');
                try {
                    const response = await fetchApi('/projects', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'list' })
                    });
                    const data = await response.json();
                    if (data.ok && data.data) {
                        data.data.forEach(project => {
                            const option = document.createElement('option');
                            option.value = project.name;
                            option.textContent = project.title || project.name;
                            projectSelect.appendChild(option);
                        });
                    }
                } catch (e) {
                    console.error('Failed to load projects:', e);
                }

                // Function to update URL based on selected project
                function updateConnectionUrl() {
                    const selectedProject = projectSelect.value;
                    let connectionUrl = `${url}/a2a/t-${token}`;
                    if (selectedProject) {
                        connectionUrl += `/p-${selectedProject}`;
                    }
                    editor.setValue(connectionUrl);
                    editor.clearSelection();
                }

                // Initialize editor
                const editor = ace.edit("a2a-connection-example");
                const dark = localStorage.getItem("darkMode");
                editor.setTheme(dark !== "false" ? "ace/theme/github_dark" : "ace/theme/tomorrow");
                editor.session.setMode("ace/mode/text");
                updateConnectionUrl();
                editor.setReadOnly(true);

                // Update URL when project selection changes
                projectSelect.addEventListener('change', updateConnectionUrl);
            })();
        </script>
    </div>

    <style>
        #a2a-connection-example {
            width: 100%;
            height: 3em;
        }
    </style>

</body>

</html>
