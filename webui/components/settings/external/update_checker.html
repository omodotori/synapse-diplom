<html>
  <head>
    <title>Проверка обновлений</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">Проверка обновлений</div>
          <div class="section-description">
            Модуль проверки периодически ищет новые выпуски Synapse и уведомляет о возможности обновления.<br>Личные данные на сервер обновлений не отправляются, передаются только анонимный уникальный идентификатор и номер текущей версии. Это помогает нам оценивать важность обновлений при выпуске критических исправлений.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Включить проверку обновлений</div>
              <div class="field-description">Включите автоматическую проверку обновлений для уведомления о выходе новых версий Synapse.</div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="settings.update_check_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
