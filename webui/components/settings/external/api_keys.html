<html>
  <head>
    <title>API Ключи</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">API Ключи</div>
          <div class="section-description">
            API-ключи для провайдеров моделей и сервисов, используемых Synapse. Вы можете указать несколько API-ключей через запятую (,). Они будут использоваться по круговому циклу (round-robin).<br>
            Для получения дополнительной информации о провайдере Synapse Venice см. <a href="http://agent-zero.ai/?community/api-dashboard/about" target="_blank">Synapse Venice</a>.
          </div>

          <template x-for="provider in $store.settings.apiKeyProviders" :key="provider.value">
            <div class="field">
              <div class="field-label">
                <div class="field-title" x-text="provider.label"></div>
              </div>
              <div class="field-control">
                <input
                  type="text"
                  x-model="$store.settings.settings.api_keys[provider.value]"
                  autocomplete="off"
                />
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
