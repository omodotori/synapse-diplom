<html>
  <head>
    <title>Аутентификация</title>
  </head>

  <body>
    <div
      x-data="{
        get settings() { return $store.settings.settings },
        get additional() { return $store.settings.additional || {} }
      }"
    >
      <template x-if="settings">
        <div>
          <div class="section-title">Аутентификация</div>
          <div class="section-description">
            Настройки аутентификации для использования веб-интерфейса Synapse.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Логин веб-интерфейса</div>
              <div class="field-description">Задайте имя пользователя для веб-интерфейса</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="settings.auth_login" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Пароль веб-интерфейса</div>
              <div class="field-description">Задайте пароль пользователя для веб-интерфейса</div>
            </div>
            <div class="field-control">
              <input type="password" autocomplete="off" x-model="settings.auth_password" />
            </div>
          </div>

          <template x-if="additional.is_dockerized">
            <div class="field">
              <div class="field-label">
                <div class="field-title">Пароль root</div>
                <div class="field-description">
                  Измените пароль суперпользователя (root) в контейнере Docker. Этот пароль может использоваться для доступа по SSH. Исходный пароль был сгенерирован случайным образом при первоначальной настройке.
                </div>
              </div>
              <div class="field-control">
                <input type="password" autocomplete="off" x-model="settings.root_password" />
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
