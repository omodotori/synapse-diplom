<html>
  <head>
    <title>LiteLLM</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">Глобальные настройки LiteLLM</div>
          <div class="section-description">
            Настройка глобальных параметров, передаваемых в LiteLLM для всех провайдеров.
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Глобальные параметры LiteLLM</div>
              <div class="field-description">
                Глобальные параметры LiteLLM (например, timeout, stream_timeout) в формате .env: по одной паре КЛЮЧ=ЗНАЧЕНИЕ на строку. Пример: <code>stream_timeout=30</code>. Применяется ко всем вызовам LiteLLM, если не переопределено. См. подробности в руководствах по <a href='https://docs.litellm.ai/docs/set_keys' target='_blank'>LiteLLM</a> и <a href='https://docs.litellm.ai/docs/proxy/timeout' target='_blank'>timeouts</a>.
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 12em" x-model="settings.litellm_global_kwargs"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
