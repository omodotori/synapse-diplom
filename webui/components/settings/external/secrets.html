<html>
  <head>
    <title>Секреты</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">Управление секретами</div>
          <div class="section-description">
            Управляйте секретами и учетными данными, которые агенты могут использовать без раскрытия значений моделям (LLM), истории чата или логам. Плейсхолдеры автоматически заменяются значениями непосредственно перед вызовами инструментов. Если в результатах работы инструментов появляются открытые пароли, они маскируются обратно в плейсхолдеры.
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Хранилище переменных</div>
              <div class="field-description">
                Храните неконфиденциальные переменные в формате .env, например: EMAIL_IMAP_SERVER="imap.gmail.com" (по одной записи на строку). Вы можете использовать комментарии, начинающиеся с #, чтобы добавить описания для Synapse. См. <a href="javascript:openModal('settings/secrets/example-vars.html')">пример</a>.<br>Эти переменные видимы для моделей и в истории чата, они не маскируются.
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.variables"></textarea>
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Хранилище секретов</div>
              <div class="field-description">
                Храните секреты и учетные данные в формате .env, например: EMAIL_PASSWORD="s3cret-p4$$w0rd" (по одной записи на строку). Вы можете использовать комментарии, начинающиеся с #, чтобы добавить описания для Synapse. См. <a href="javascript:openModal('settings/secrets/example-secrets.html')">пример</a>.<br>Эти переменные невидимы для моделей и маскируются в истории чата. ⚠️ Во избежание ложных срабатываний маскируются только значения длиной не менее 4 символов.
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.secrets"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
