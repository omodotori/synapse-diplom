<html>
  <head>
    <title>Голос и речь</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">Голос и речь</div>
          <div class="section-description">
            Настройки распознавания и синтеза речи.
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Устройство микрофона</div>
              <div class="field-description">Выберите микрофон для распознавания речи.</div>
            </div>
            <div class="field-control">
              <x-component path="settings/speech/microphone.html"></x-component>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Размер модели распознавания речи</div>
              <div class="field-description">Выберите размер модели распознавания речи (Whisper)</div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.stt_model_size" @change="if(['tiny', 'base', 'small', 'medium', 'large', 'turbo'].includes($event.target.value)) { $store.settings.settings.stt_language = 'ru'; }">
                <template x-for="option in $store.settings.additional?.stt_models" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.stt_model_size" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Код языка распознавания речи</div>
              <div class="field-description">Код языка (например ru, en, fr)</div>
            </div>
            <div class="field-control">
              <input type="text" x-model="$store.settings.settings.stt_language" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Порог тишины микрофона</div>
              <div class="field-description">Порог определения тишины. Меньшие значения более чувствительны к шуму.</div>
            </div>
            <div class="field-control">
              <input type="range" min="0" max="1" step="0.01" x-model.number="$store.settings.settings.stt_silence_threshold" />
              <span class="range-value" x-text="$store.settings.settings.stt_silence_threshold"></span>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Длительность тишины микрофона (мс)</div>
              <div class="field-description">Длительность тишины перед тем, как система посчитает разговор оконченным.</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_silence_duration" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Таймаут ожидания микрофона (мс)</div>
              <div class="field-description">Длительность тишины перед закрытием микрофона системой.</div>
            </div>
            <div class="field-control">
              <input type="number" x-model.number="$store.settings.settings.stt_waiting_timeout" />
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Включить Kokoro TTS</div>
              <div class="field-description">
                Включить более качественный серверный ИИ (Kokoro) вместо браузерного синтеза речи.
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.tts_kokoro" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
