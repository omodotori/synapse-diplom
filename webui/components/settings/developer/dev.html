<html>
  <head>
    <title>Разработка</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">Разработка</div>
          <div class="section-description">
            Параметры для разработки фреймворка A0. RFC (удаленные вызовы функций) используются для вызова функций на другом экземпляре A0. Вы можете разрабатывать и отлаживать A0 локально на вашей системе, перенаправляя некоторые функции на экземпляр A0 в Docker. Это крайне важно для разработки, так как A0 должен работать в стандартизированной среде для поддержки всех функций.
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="field">
                <div class="field-label">
                  <div class="field-title">RFC URL назначения</div>
                  <div class="field-description">
                    URL-адрес контейнеризированного (Docker) экземпляра A0 для удаленных вызовов функций. Не указывайте здесь порт.
                  </div>
                </div>
                <div class="field-control">
                  <input type="text" x-model="$store.settings.settings.rfc_url" />
                </div>
              </div>
            </div>
          </template>

          <div class="field">
            <div class="field-label">
              <div class="field-title">RFC Пароль</div>
              <div class="field-description">
                Пароль для удаленных вызовов функций. Пароли должны совпадать на обоих экземплярах. RFC не могут быть использованы с пустым паролем.
              </div>
            </div>
            <div class="field-control">
              <input type="password" autocomplete="off" x-model="$store.settings.settings.rfc_password" />
            </div>
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="field">
                <div class="field-label">
                  <div class="field-title">RFC HTTP-порт</div>
                  <div class="field-description">HTTP-порт контейнеризированного экземпляра A0.</div>
                </div>
                <div class="field-control">
                  <input type="number" x-model.number="$store.settings.settings.rfc_port_http" />
                </div>
              </div>

            </div>
          </template>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Транслировать событие перезапуска сервера</div>
              <div class="field-description">
                Отправлять клиентам широковещательное уведомление <code>server_restart</code> по принципу «выстрелил и забыл» после запуска сервера.
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.websocket_server_restart_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Включить логи доступа uvicorn</div>
              <div class="field-description">
                Временно включить логи доступа uvicorn для отладки проблем с транспортом WebSocket (по умолчанию выключено).
              </div>
              <template
                x-if="$store.settings.additional?.runtime_settings &&
                  $store.settings.settings?.uvicorn_access_logs_enabled !==
                    $store.settings.additional.runtime_settings.uvicorn_access_logs_enabled"
              >
                <div class="field-description">
                  Применяется после перезапуска бэкенда.
                </div>
              </template>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="$store.settings.settings.uvicorn_access_logs_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <template x-if="!$store.settings.additional?.is_dockerized">
            <div>
              <div class="section-title">Тестирование</div>
              <div class="section-description">
                Утилиты для проверки инфраструктуры WebSocket в средах разработки.
              </div>

              <div class="field">
                <div class="field-label">
                  <div class="field-title">Тестовый стенд WebSocket</div>
                  <div class="field-description">
                    Открыть тестовый стенд разработчика для запуска автоматических и ручных наборов тестов проверки WebSocket.
                  </div>
                </div>
                <div class="field-control">
                  <button
                    class="btn btn-field"
                    @click="openModal('settings/developer/websocket-tester.html');"
                  >
                    Открыть стенд
                  </button>
                </div>
              </div>

              <div class="field">
                <div class="field-label">
                  <div class="field-title">Консоль событий WebSocket</div>
                  <div class="field-description">
                    Инспектировать входящие и исходящие конверты сообщений и жизненный цикл событий в реальном времени (только для разработки).
                  </div>
                </div>
                <div class="field-control">
                  <button
                    class="btn btn-field"
                    @click="openModal('settings/developer/websocket-event-console.html');"
                  >
                    Открыть консоль
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </body>
</html>
