<html>
<head>
  <title>Тестовый стенд WebSocket</title>
  <script type="module">
    import { store as websocketTesterStore } from "/components/settings/developer/websocket-test-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="window.runtimeInfo?.isDevelopment && $store.websocketTesterStore">
      <div class="ws-tester" x-create="$store.websocketTesterStore.onOpen()" x-destroy="$store.websocketTesterStore.detach()">
        <h2>Стенд разработчика WebSocket</h2>
        <p class="ws-description">
          Запуск автоматических и ручных проверок для клиента WebSocket. Автоматические тесты охватывают отправку по принципу «выстрелил и забыл» (fire-and-forget emit), запрос-ответ (request/response), обработку таймаутов, сохранение подписок и агрегацию requestAll.
        </p>

        <div class="ws-section">
          <div class="ws-section-header">
            <h3>Набор автоматических проверок</h3>
            <button class="btn btn-ok" :disabled="$store.websocketTesterStore.running" @click="$store.websocketTesterStore.runAutomaticSuite()">
              <span x-show="!$store.websocketTesterStore.running">Запустить весь набор</span>
              <span x-show="$store.websocketTesterStore.running">Выполняется...</span>
            </button>
          </div>
          <p class="ws-section-info">
            Последовательно выполняет все тесты функций WebSocket. Прогресс и результаты отображаются в логе ниже и во всплывающих уведомлениях (5 сек).
          </p>
        </div>

        <div class="ws-section">
          <div class="ws-section-header">
            <h3>Ручные тесты</h3>
            <div class="ws-button-grid">
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualEmit()">Отправка «выстрелил и забыл»</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualRequest()">Запрос/Ответ</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualRequestTimeout()">Таймаут запроса</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualPersistence()">Сохранение подписки</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualRequestAll()">Агрегация requestAll</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualStateSync()">Синхронизация состояния (без опроса при норме)</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualContextSwitch()">Переключение контекста</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualFallbackRecovery()">Откат + восстановление (ДЕГРАДАЦИЯ)</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.runManualResyncTriggers()">Триггеры ресинхронизации (разрыв runtime_epoch/seq)</button>
              <button class="btn" :disabled="$store.websocketTesterStore.manualRunning" @click="$store.websocketTesterStore.triggerBroadcastDemo()">Демонстрация трансляции</button>
            </div>
            <p class="ws-section-info">
              Ручные тесты запускают отдельные сценарии и показывают результаты в уведомлениях. Откройте вторую вкладку браузера для демонстрации requestAll/трансляций, чтобы наблюдать за поведением при нескольких соединениях.
            </p>
          </div>
        </div>

        <div class="ws-section">
          <div class="ws-section-header">
            <h3>Вывод логов</h3>
            <div class="ws-log-actions">
              <button class="btn slim" @click="$store.websocketTesterStore.clearLog()">Очистить</button>
            </div>
          </div>
          <textarea class="ws-log" readonly x-model="$store.websocketTesterStore.logs"></textarea>
        </div>

        <div class="ws-section" x-show="$store.websocketTesterStore.lastAggregated">
          <div class="ws-section-header">
            <h3>Последние агрегированные результаты</h3>
          </div>
          <pre class="ws-json" x-text="JSON.stringify($store.websocketTesterStore.lastAggregated, null, 2)"></pre>
        </div>

        <div class="ws-section" x-show="$store.websocketTesterStore.receivedBroadcasts.length">
          <div class="ws-section-header">
            <h3>Последние полезные данные трансляций</h3>
          </div>
          <ul class="ws-list">
            <template x-for="item in $store.websocketTesterStore.receivedBroadcasts.slice(-10)" :key="item.id || (item.timestamp + item.eventType)">
              <li><strong x-text="item.eventType"></strong>: <span x-text="JSON.stringify(item.payload)"></span> <em x-text="item.timestamp"></em></li>
            </template>
          </ul>
        </div>
      </div>
    </template>
    <template x-if="!window.runtimeInfo?.isDevelopment">
      <div class="ws-tester ws-disabled">
        <h2>Стенд разработчика WebSocket</h2>
        <p class="ws-description">
          Тестовый стенд WebSocket доступен только в том случае, если Synapse запущен в режиме разработки.
        </p>
      </div>
    </template>
  </div>

  <style>
    .ws-tester {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      color: var(--color-text-primary);
    }

    .ws-description {
      margin: 0;
      color: var(--color-text-secondary);
    }

    .ws-disabled {
      align-items: flex-start;
    }

    .ws-section {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 1rem;
    }

    .ws-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .ws-section-header h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .ws-section-info {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }

    .ws-button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem;
      margin: 1rem 0;
    }

    .ws-log {
      width: 100%;
      min-height: 12em;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      resize: vertical;
    }

    .ws-log-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .ws-json {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      overflow: auto;
      max-height: 200px;
    }

    .ws-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.9rem;
    }

    .ws-list li {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.5rem;
    }
  </style>
</body>
</html>
