<html>
  <head>
    <title>MCP-сервер A0</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">MCP-сервер A0</div>
          <div class="section-description">
            Synapse можно развернуть как SSE MCP-сервер. См. <a href="javascript:openModal('settings/mcp/server/example.html')">пример подключения</a>.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Включить MCP-сервер A0</div>
              <div class="field-description">
                Предоставить доступ к Synapse как к SSE/HTTP MCP-серверу. Это сделает текущий экземпляр A0 доступным для внешних MCP-клиентов.
              </div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="settings.mcp_server_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
