<html>

<head>
    <title>Подключение к MCP-серверу A0</title>

</head>

<body>
    <div x-data>
        <p>MCP-сервер Synapse — это SSE MCP, работающий на том же URL-адресе и порту, что и веб-интерфейс, по путям /mcp/sse или /mcp/http.</p>
        <p>То же самое применимо, если вы запускаете A0 на публичном URL-адресе с использованием туннеля.</p>

        <!-- API Token Information -->
        <div x-data>
            <template x-if="$store.settings.settings">
                <div style="background-color: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: 6px; padding: 12px; margin: 16px 0;">
                    <h4 style="margin: 0 0 8px 0; color: var(--color-text-primary);">Информация об API-токене</h4>
                    <p style="margin: 0 0 8px 0; color: var(--color-text-secondary); font-size: 14px;">
                        Токен, используемый в URL-адресе, автоматически генерируется на основе вашего имени пользователя и пароля.
                        Этот же токен также используется для внешних конечных точек API. Токен меняется при обновлении ваших учетных данных.
                    </p>
                    <div style="margin-top: 8px;">
                        <label style="display: block; margin-bottom: 4px; color: var(--color-text-secondary); font-size: 12px; font-weight: 600;">Токен:</label>
                        <input type="text" readonly x-model="$store.settings.settings.mcp_server_token" style="width: 100%; padding: 6px 8px; background-color: var(--color-bg-primary); color: var(--color-text-primary); border: 1px solid var(--color-border); border-radius: 4px; font-family: monospace; font-size: 13px;" />
                    </div>
                </div>
            </template>
        </div>

        <h3>Пример JSON конфигурации MCP-сервера</h3>

        <!-- Project selector -->
        <div style="margin: 16px 0;">
            <label for="mcp-project-select" style="display: block; margin-bottom: 8px; color: var(--color-text-primary);">
                Выберите проект (необязательно):
            </label>
            <select id="mcp-project-select" style="width: 100%; padding: 8px; background-color: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border); border-radius: 4px;">
                <option value="">Без проекта</option>
            </select>
        </div>

        <div id="mcp-server-example"></div>

        <script>
            (async () => {
                const API = await import("/js/api.js");
                const url = window.location.origin;

                // Fetch token from settings API
                let token = "";
                try {
                    const response = await API.callJsonApi("settings_get", null);
                    token = response?.settings?.mcp_server_token || "";
                } catch (e) {
                    console.error("Failed to fetch token:", e);
                }

                // Fetch and populate projects
                const projectSelect = document.getElementById('mcp-project-select');
                try {
                    const response = await fetchApi('/projects', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'list' })
                    });
                    const data = await response.json();
                    if (data.ok && data.data) {
                        data.data.forEach(project => {
                            const option = document.createElement('option');
                            option.value = project.name;
                            option.textContent = project.title || project.name;
                            projectSelect.appendChild(option);
                        });
                    }
                } catch (e) {
                    console.error('Failed to load projects:', e);
                }

                // Function to update JSON based on selected project
                function updateMcpConfig() {
                    const selectedProject = projectSelect.value;
                    const projectPath = selectedProject ? `/p-${selectedProject}` : '';

                    const jsonExample = JSON.stringify({
                        "mcpServers":
                        {
                            "agent-zero": {
                                "type": "sse",
                                "url": `${url}/mcp/t-${token}${projectPath}/sse`
                            },
                            "agent-zero-http": {
                                "type": "streamable-http",
                                "url": `${url}/mcp/t-${token}${projectPath}/http`
                            }
                        }
                    }, null, 2);

                    editor.setValue(jsonExample);
                    editor.clearSelection();
                }

                // Initialize editor
                const editor = ace.edit("mcp-server-example");
                const dark = localStorage.getItem("darkMode");
                editor.setTheme(dark !== "false" ? "ace/theme/github_dark" : "ace/theme/tomorrow");
                editor.session.setMode("ace/mode/json");
                updateMcpConfig();
                editor.setReadOnly(true);

                // Update JSON when project selection changes
                projectSelect.addEventListener('change', updateMcpConfig);
            })();
        </script>
        <!-- </template> -->
    </div>

    <style>
        #mcp-server-example {
            width: 100%;
            height: 15em;
        }
    </style>

</body>

</html>
