<html>
<head>
    <script type="module">
        import { store } from "/components/modals/scheduler/scheduler-store.js";
    </script>
</head>
<body>
<div x-data>
    <template x-if="$store.schedulerStore">
        <div>
            <!-- Create Task Form -->
            <div class="scheduler-form" x-show="$store.schedulerStore.isCreating">
                <div class="scheduler-form-header">
                    <div class="scheduler-form-title">Создать новую задачу</div>
                </div>
                <div class="buttons-container scheduler-editor-actions scheduler-editor-actions-top">
                    <div class="buttons-left"></div>
                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                                @click="$store.schedulerStore.cancelEdit()">Отмена</button>
                        <button type="button" class="button confirm"
                                @click="$store.schedulerStore.saveTask()">Сохранить</button>
                    </div>
                </div>

                <div class="scheduler-form-grid">
                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Название задачи</label>
                            <div class="scheduler-form-help">Уникальное имя для идентификации этой задачи</div>
                        </div>
                        <input type="text" x-model="$store.schedulerStore.editingTask.name" placeholder="Введите название задачи">
                    </div>

                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Тип</label>
                            <div class="scheduler-form-help">Метод выполнения задачи</div>
                        </div>
                        <select x-model="$store.schedulerStore.editingTask.type">
                            <option value="scheduled">По расписанию (Cron)</option>
                            <option value="adhoc">Разовая (Вручную)</option>
                            <option value="planned">Запланированная (В конкретное время)</option>
                        </select>
                    </div>

                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Проект</label>
                            <div class="scheduler-form-help"
                                 x-text="$store.schedulerStore.editingTask.dedicated_context ? 'Наследуется из активного проекта чата.' : 'Соответствует общему контекстному проекту.'"></div>
                        </div>
                        <div class="project-selector">
                            <select class="scheduler-project-select"
                                    x-model="$store.schedulerStore.selectedProjectSlug"
                                    @change="$store.schedulerStore.onProjectSelect($event.target.value)">
                                <option value="">Без проекта</option>
                                <template x-for="proj in $store.schedulerStore.projectOptions" :key="proj.name">
                                    <option :value="proj.name" x-text="proj.title"></option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <div class="scheduler-form-field" x-show="$store.schedulerStore.isCreating">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Состояние</label>
                            <div class="scheduler-form-help">Выберите начальное состояние задачи</div>
                        </div>
                        <div>
                            <div class="scheduler-state-selector">
                                <span class="scheduler-status-badge scheduler-status-idle"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'idle'}"
                                      @click="$store.schedulerStore.editingTask.state = 'idle'">Ожидание</span>
                                <span class="scheduler-status-badge scheduler-status-running"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'running'}"
                                      @click="$store.schedulerStore.editingTask.state = 'running'">Выполнение</span>
                                <span class="scheduler-status-badge scheduler-status-disabled"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'disabled'}"
                                      @click="$store.schedulerStore.editingTask.state = 'disabled'">Отключено</span>
                                <span class="scheduler-status-badge scheduler-status-error"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'error'}"
                                      @click="$store.schedulerStore.editingTask.state = 'error'">Ошибка</span>
                            </div>
                            <div class="scheduler-state-explanation">
                                <span x-show="$store.schedulerStore.editingTask.state === 'idle'"><strong>Ожидание</strong>: Готова к запуску</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'running'"><strong>Выполнение</strong>: Запущена в данный момент</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'disabled'"><strong>Отключено</strong>: Не будет запускаться автоматически</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'error'"><strong>Ошибка</strong>: Обнаружена ошибка при выполнении</span>
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask.type === 'scheduled'">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Расписание</label>
                            <div class="scheduler-form-help">Расписание Cron для автоматического запуска (минута час день месяц день_недели)</div>
                        </div>
                        <div class="scheduler-schedule-builder">
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Минута</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.minute"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Час</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.hour"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">День</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.day"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Месяц</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.month"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">День недели</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.weekday"
                                       placeholder="*" maxlength="9">
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask.type === 'planned'"
                         x-effect="if ($store.schedulerStore.isCreating && $store.schedulerStore.editingTask.type === 'planned') { $store.schedulerStore.initFlatpickr('create') }">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">План</label>
                            <div class="scheduler-form-help">Конкретное время запуска задачи</div>
                        </div>
                        <div class="scheduler-plan-builder">
                            <div class="scheduler-plan-todo">
                                <span class="scheduler-plan-label">Предстоящие запуски</span>
                                <div class="scheduler-todo-list">
                                    <template x-if="$store.schedulerStore.editingTask.plan && Array.isArray($store.schedulerStore.editingTask.plan.todo) && $store.schedulerStore.editingTask.plan.todo.length > 0">
                                        <template x-for="(time, index) in $store.schedulerStore.editingTask.plan.todo" :key="index">
                                            <div class="scheduler-todo-item">
                                                <span x-text="$store.schedulerStore.formatDate(time)"></span>
                                                <button @click.prevent="$store.schedulerStore.editingTask.plan.todo.splice(index, 1)"
                                                        class="scheduler-todo-remove">
                                                    <span class="material-symbols-outlined">close</span>
                                                </button>
                                            </div>
                                        </template>
                                    </template>
                                    <template x-if="!$store.schedulerStore.editingTask.plan || !$store.schedulerStore.editingTask.plan.todo || $store.schedulerStore.editingTask.plan.todo.length === 0">
                                        <div class="scheduler-empty-plan">
                                            Нет запланированного времени запуска. Добавьте его ниже.
                                        </div>
                                    </template>
                                    <div class="scheduler-add-todo">
                                        <input type="text" id="newPlannedTime-create"
                                               class="scheduler-flatpickr-input"
                                               placeholder="Выберите дату и время">
                                        <button @click.prevent="$store.schedulerStore.addPlannedTime('create')"
                                                class="btn btn-ok scheduler-add-todo-button">
                                            <span class="material-symbols-outlined">add</span>
                                            Добавить время
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask.type === 'adhoc'">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Токен</label>
                            <div class="scheduler-form-help">Токен для запуска этой задачи извне</div>
                        </div>
                        <div class="input-group">
                            <input type="text" x-model="$store.schedulerStore.editingTask.token"
                                   placeholder="Токен для разовой задачи">
                            <button class="btn btn-action generate-token"
                                    @click="$store.schedulerStore.editingTask.token = $store.schedulerStore.generateRandomToken()"
                                    title="Сгенерировать токен">
                                <span class="material-symbols-outlined">refresh</span>
                                Создать
                            </button>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Системный промпт</label>
                            <div class="scheduler-form-help">Системные инструкции для ассистента</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.editingTask.system_prompt"
                                  placeholder="Системные инструкции для ИИ"></textarea>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Промпт пользователя</label>
                            <div class="scheduler-form-help">Основной запрос задачи, который будет выполнен</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.editingTask.prompt"
                                  placeholder="Сообщение пользователя для ИИ"></textarea>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Вложения</label>
                            <div class="scheduler-form-help">Пути к файлам или URL, по одному на строку</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.attachmentsText"
                                  placeholder="Введите пути к файлам или URL, каждый с новой строки"></textarea>
                    </div>
                </div>
            </div>

            <!-- Edit Task Form -->
            <div class="scheduler-form" x-show="$store.schedulerStore.isEditing">
                <div class="scheduler-form-header">
                    <div class="scheduler-form-title">Редактировать задачу</div>
                </div>
                <div class="buttons-container scheduler-editor-actions scheduler-editor-actions-top">
                    <div class="buttons-left">
                        <button type="button" class="button cancel"
                                @click="$confirmClick($event, () => $store.schedulerStore.deleteTask($store.schedulerStore.editingTask.uuid))">Удалить</button>
                    </div>
                    <div class="buttons-right">
                        <button type="button" class="button cancel"
                                @click="$store.schedulerStore.cancelEdit()">Отмена</button>
                        <button type="button" class="button confirm"
                                @click="$store.schedulerStore.saveTask()">Сохранить</button>
                    </div>
                </div>

                <div class="scheduler-form-grid">
                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Название задачи</label>
                            <div class="scheduler-form-help">Уникальное имя для идентификации этой задачи</div>
                        </div>
                        <input type="text" x-model="$store.schedulerStore.editingTask.name" placeholder="Введите название задачи">
                    </div>

                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Тип задачи</label>
                            <div class="scheduler-form-help">Тип задачи не может быть изменен после создания</div>
                        </div>
                        <select x-model="$store.schedulerStore.editingTask.type" disabled>
                            <option value="scheduled">Задача по расписанию</option>
                            <option value="adhoc">Разовая задача</option>
                            <option value="planned">Запланированная задача</option>
                        </select>
                    </div>

                    <div class="scheduler-form-field">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Проект</label>
                            <div class="scheduler-form-help"
                                 x-text="$store.schedulerStore.editingTask.dedicated_context ? 'Специализированные задачи наследуют активный проект чата.' : 'Общие задачи используют проект, назначенный их контексту.'"></div>
                        </div>
                        <div class="project-display">
                            <span class="project-color-ball"
                                  :style="$store.schedulerStore.editingTask.project?.color ? { backgroundColor: $store.schedulerStore.editingTask.project.color } : { border: '1px solid var(--color-border)' }"></span>
                            <span x-text="$store.schedulerStore.formatProjectLabel($store.schedulerStore.editingTask.project)"></span>
                        </div>
                    </div>

                    <div class="scheduler-form-field" x-show="$store.schedulerStore.isEditing">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Состояние</label>
                            <div class="scheduler-form-help">Изменить состояние задачи</div>
                        </div>
                        <div>
                            <div class="scheduler-state-selector">
                                <span class="scheduler-status-badge scheduler-status-idle"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'idle'}"
                                      @click="$store.schedulerStore.editingTask.state = 'idle'">Ожидание</span>
                                <span class="scheduler-status-badge scheduler-status-running"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'running'}"
                                      @click="$store.schedulerStore.editingTask.state = 'running'">Выполнение</span>
                                <span class="scheduler-status-badge scheduler-status-disabled"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'disabled'}"
                                      @click="$store.schedulerStore.editingTask.state = 'disabled'">Отключено</span>
                                <span class="scheduler-status-badge scheduler-status-error"
                                      :class="{'scheduler-status-selected': $store.schedulerStore.editingTask.state === 'error'}"
                                      @click="$store.schedulerStore.editingTask.state = 'error'">Ошибка</span>
                            </div>
                            <div class="scheduler-state-explanation">
                                <span x-show="$store.schedulerStore.editingTask.state === 'idle'"><strong>Ожидание</strong>: Готова к запуску</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'running'"><strong>Выполнение</strong>: Запущена в данный момент</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'disabled'"><strong>Отключено</strong>: Не будет запускаться автоматически</span>
                                <span x-show="$store.schedulerStore.editingTask.state === 'error'"><strong>Ошибка</strong>: Обнаружена ошибка при выполнении</span>
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask && $store.schedulerStore.editingTask.type === 'scheduled'">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Расписание (Выражение Cron)</label>
                            <div class="scheduler-form-help">Формат: минута час день месяц день_недели (например, &quot;* * * * *&quot; для запуска каждую минуту)</div>
                        </div>
                        <div class="scheduler-schedule-builder">
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Минута</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.minute"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Час</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.hour"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">День</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.day"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">Месяц</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.month"
                                       placeholder="*" maxlength="9">
                            </div>
                            <div class="scheduler-schedule-field">
                                <span class="scheduler-schedule-label">День недели</span>
                                <input type="text" x-model="$store.schedulerStore.editingTask.schedule.weekday"
                                       placeholder="*" maxlength="9">
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask.type === 'planned'"
                         x-effect="if ($store.schedulerStore.isEditing && $store.schedulerStore.editingTask.type === 'planned') { $store.schedulerStore.initFlatpickr('edit') }">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">План</label>
                            <div class="scheduler-form-help">Конкретное время запуска задачи</div>
                        </div>
                        <div class="scheduler-plan-builder">
                            <div class="scheduler-plan-todo">
                                <span class="scheduler-plan-label">Предстоящие запуски</span>
                                <div class="scheduler-todo-list">
                                    <template x-if="$store.schedulerStore.editingTask.plan && Array.isArray($store.schedulerStore.editingTask.plan.todo) && $store.schedulerStore.editingTask.plan.todo.length > 0">
                                        <template x-for="(time, index) in $store.schedulerStore.editingTask.plan.todo" :key="index">
                                            <div class="scheduler-todo-item">
                                                <span x-text="$store.schedulerStore.formatDate(time)"></span>
                                                <button @click.prevent="$store.schedulerStore.editingTask.plan.todo.splice(index, 1)"
                                                        class="scheduler-todo-remove">
                                                    <span class="material-symbols-outlined">close</span>
                                                </button>
                                            </div>
                                        </template>
                                    </template>
                                    <template x-if="!$store.schedulerStore.editingTask.plan || !$store.schedulerStore.editingTask.plan.todo || $store.schedulerStore.editingTask.plan.todo.length === 0">
                                        <div class="scheduler-empty-plan">
                                            Нет запланированного времени запуска. Добавьте его ниже.
                                        </div>
                                    </template>
                                    <div class="scheduler-add-todo">
                                        <input type="text" id="newPlannedTime-edit"
                                               class="scheduler-flatpickr-input"
                                               placeholder="Выберите дату и время">
                                        <button @click.prevent="$store.schedulerStore.addPlannedTime('edit')"
                                                class="btn btn-ok scheduler-add-todo-button">
                                            <span class="material-symbols-outlined">add</span>
                                            Добавить время
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width"
                         x-show="$store.schedulerStore.editingTask.type === 'adhoc'">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Токен</label>
                            <div class="scheduler-form-help">Токен для запуска этой задачи извне</div>
                        </div>
                        <div class="input-group">
                            <input type="text" x-model="$store.schedulerStore.editingTask.token"
                                   placeholder="Токен для разовой задачи">
                            <button class="btn btn-action generate-token"
                                    @click="$store.schedulerStore.editingTask.token = $store.schedulerStore.generateRandomToken()"
                                    title="Сгенерировать токен">
                                <span class="material-symbols-outlined">refresh</span>
                                Создать
                            </button>
                        </div>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Системный промпт</label>
                            <div class="scheduler-form-help">Системные инструкции для ассистента</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.editingTask.system_prompt"
                                  placeholder="Системные инструкции для ИИ"></textarea>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Промпт пользователя</label>
                            <div class="scheduler-form-help">Основной запрос задачи, который будет выполнен</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.editingTask.prompt"
                                  placeholder="Сообщение пользователя для ИИ"></textarea>
                    </div>

                    <div class="scheduler-form-field full-width">
                        <div class="label-help-wrapper">
                            <label class="scheduler-form-label">Вложения</label>
                            <div class="scheduler-form-help">Пути к файлам или URL, по одному на строку</div>
                        </div>
                        <textarea x-model="$store.schedulerStore.attachmentsText"
                                  placeholder="Введите пути к файлам или URL, каждый с новой строки"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

<style>
    /* Form header with Save/Cancel buttons - aligns with Projects pattern */

    .scheduler-form-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--color-primary);
    }

    .scheduler-form-actions {
        display: flex;
        gap: 0.5rem;
    }

    .scheduler-editor-actions {
        margin: 0 0 1rem 0;
    }

    /* Generate token button - extends .btn-action from buttons.css */
    .btn-action.generate-token {
        padding: 0.4rem 0.75rem;
        white-space: nowrap;
    }

    /* Todo remove button with Material Symbol */
    .scheduler-todo-remove {
        background: none;
        border: 1px solid var(--color-border);
        padding: 0.15rem;
        color: var(--color-text);
        opacity: 0.7;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
    }

    .scheduler-todo-remove .material-symbols-outlined {
        font-size: 16px;
    }

    .scheduler-todo-remove:hover {
        opacity: 1;
        border-color: var(--color-accent);
        color: var(--color-accent);
    }

    /* Add todo button styling */
    .scheduler-add-todo-button {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
    }

    .scheduler-add-todo-button .material-symbols-outlined {
        font-size: 18px;
    }

    /* Project color ball */
    .project-color-ball {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
    }
